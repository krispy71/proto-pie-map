services:
  proto-pie-map:
    build: .
    ports:
      - "${PORT:-3020}:3020"
    environment:
      - NODE_ENV=production
      - PORT=3020
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3020/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
